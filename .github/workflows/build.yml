name: Build EXE

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Get Version
        id: get_version
        run: |
          $version = (Get-Content main.py | Select-String 'VERSION = "(.*)"').Matches.Groups[1].Value
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          if ("${{ github.ref_type }}" -eq "tag") {
            echo "TAG_NAME=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          } else {
            echo "TAG_NAME=$version-build.${{ github.run_number }}" >> $env:GITHUB_OUTPUT
          }

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --noconsole --name "vpk_reader_KV_uploader" main.py
          pyinstaller --onefile --console --name "updater" updater.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpk_reader_KV_uploader-exe
          path: |
            dist/vpk_reader_KV_uploader.exe
            dist/updater.exe

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.TAG_NAME }}
          files: |
            dist/vpk_reader_KV_uploader.exe
            dist/updater.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
